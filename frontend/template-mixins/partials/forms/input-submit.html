{% macro inputSubmit(value, text, id) %}
  {% set args = {
    text: text,
    type: "submit",
    value: value,
    preventDoubleClick: params.preventDoubleClick | default(true),
    id: id
    } 
  %}

  {% from "govuk/components/button/macro.njk" import govukButton %}
  {{ govukButton(args) }}
{% endmacro %}
