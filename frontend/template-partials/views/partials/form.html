{% macro form(encoding="", intro="", csrf_token) %}
<form action="" method="POST" {{ encoding }} autocomplete="off" novalidate="true" spellcheck="false">
  {% if intro %}<p>{{ intro }}</p>{% endif %}
  {{ caller() }}
  {% if csrf_token %}
    <input type="hidden" name="x-csrf-token" value="{{ csrf_token }}" />
  {% endif %}
</form>
{% endmacro %}
