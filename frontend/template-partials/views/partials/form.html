{% macro form(csrf_token) %}
<form action="" method="POST" {% block encoding %}{% endblock %} autocomplete="off" novalidate="true" spellcheck="false">
  {% block intro %}
  {% if intro %}<p>{{ intro }}</p>{% endif %}
  {% endblock %}
  {{ caller() }}
  {% if csrf_token %}
    <input type="hidden" name="x-csrf-token" value="{{ csrf_token }}" />
  {% endif %}
</form>
{% endmacro %}
