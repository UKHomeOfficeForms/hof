<div class="govuk-form-group {% if error %}govuk-form-group--error{% endif %}">
<fieldset id="{{ key }}-group" class="govuk-fieldset{% if className %} {{ className }}{% endif %}" role="group">
  <legend class="govuk-fieldset__legend {% if isPageHeading %}govuk-fieldset__legend--l{% endif %}{% if legendClassName %} {{ legendClassName }}{% endif %}">
    {% if isPageHeading %}<h1 class="govuk-fieldset__heading">{% endif %}
      {{ legend }}
    {% if isPageHeading %}</h1>{% endif %}
  </legend>
    {% if hint %}
      <div id="{{key}}-hint" class="govuk-hint">{{ hint | safe }}</div>
    {% endif %}
    {% if error %}
      <p id="{{key}}-error" class="govuk-error-message">
        <span class="govuk-visually-hidden">Error:</span> {{ error.message }}
      </p>
    {% endif %}
  <div id="{{ key }}" class="govuk-amount-with-unit-select-input">
    {{ inputAmountWithUnitSelect(key) }}
  </div>
</fieldset>
</div>
